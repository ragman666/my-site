<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="css/style.css" />
    <link rel="preconnect" type="text/css" href="https://fonts.googleapis.com">
    <link rel="preconnect" type="text/css" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <title>DOGGO!</title>
  </head>
  <body>
    <h1>Dogs, OnlyDogs, Its raining dogs, Dog'o'matic 9000 </h1>
<!--
    <button id="click">Sort Teams</button>
    <button id="dont-click">Load Page</button>
//-->
  <div class="container">
    <h1>📝 Data Entry</h1>
    <!-- Entry Form -->
    <form id="entry-form">
      <div class="form-group">
        <!--<label for="name">Follow the leader <span class="required">*</span></label>-->
        <label class="block"><input type="radio" id="name" name="name" value="Adam">Adam</label>
        <label class="block"><input type="radio" id="name" name="name" value="Lucy">Lucy</label>
        <!--<input type="radio" id="name" name="name" >-->
      </div>
      <br>
      <div class="form-group">
        <label for="totalpeeps">How many other peoples</label>
        <input type="range" id="totalpeeps" name="totalpeeps" list="values" min="1" max="10", step="1" value="0">
      </div>
      <datalist id="values">
        <option value="0" label="0"></option>
        <option value="1" label="1"></option>
        <option value="2" label="2"></option>
        <option value="3" label="3"></option>
        <option value="4" label="4"></option>
        <option value="5" label="5"></option>
        <option value="6" label="6"></option>
        <option value="7" label="7"></option>
        <option value="8" label="8"></option>
        <option value="9" label="9"></option>
        <option value="10" label="10"></option>
      </datalist>
      <div class="form-group">
        <label for="behaviour">Behaviour - from 1 (very bad) to 10 (very good)</label>
        <input type="range" id="behaviour" name="behaviour" list="values" min="1" max="10", step="1">
      </div>
      <datalist id="values">
        <option value="1" label="1"></option>
        <option value="2" label="2"></option>
        <option value="3" label="3"></option>
        <option value="4" label="4"></option>
        <option value="5" label="5"></option>
        <option value="6" label="6"></option>
        <option value="7" label="7"></option>
        <option value="8" label="8"></option>
        <option value="9" label="9"></option>
        <option value="10" label="10"></option>
      </datalist>
      <div class="form-group">
        <label for="pulling">Loose lead walking - from 1 (very bad) to 10 (very good)</label>
        <input type="range" id="pulling" name="pulling" list="values" min="1" max="10", step="1">
      </div>
      <datalist id="values">
        <option value="1" label="1"></option>
        <option value="2" label="2"></option>
        <option value="3" label="3"></option>
        <option value="4" label="4"></option>
        <option value="5" label="5"></option>
        <option value="6" label="6"></option>
        <option value="7" label="7"></option>
        <option value="8" label="8"></option>
        <option value="9" label="9"></option>
        <option value="10" label="10"></option>
      </datalist>
      <div class="form-group">
        <label for="reactive">Reactivity to other Dogs - from 1 (very bad) to 10 (very good)</label>
        <input type="range" id="reactive" name="reactive" list="values" min="1" max="10", step="1">
      </div>
      <datalist id="values">
        <option value="1" label="1"></option>
        <option value="2" label="2"></option>
        <option value="3" label="3"></option>
        <option value="4" label="4"></option>
        <option value="5" label="5"></option>
        <option value="6" label="6"></option>
        <option value="7" label="7"></option>
        <option value="8" label="8"></option>
        <option value="9" label="9"></option>
        <option value="10" label="10"></option>
      </datalist>
      <div class="form-group">
        <label for="datetime">Date and time of Walk</label>
        <input type="datetime-local" id="datetime" name="datetime">
      </div>
      <div class="form-group">
        <label for="length">How long was the walk</label>
        <input type="time" id="length" name="length">
      </div>
      <div class="form-group">
        <label for="notes">Any notes about the walk</label>
        <textarea id="notes" name="notes" rows="4" placeholder="Enter your notes"></textarea>
      </div>
      <button type="submit" id="submit-btn">Save Entry</button>
    </form>

    <!-- Status Message -->
    <div id="status" class="status hidden"></div>
    <!-- Entries List -->
    <div class="entries-section">
      <div class="entries-header">
        <h2>Saved Entries</h2>
        <span id="entry-count" class="entry-count">0 entries</span>
      </div>
      <div id="entries-list">
        <p class="loading">Loading entries...</p>
      </div>
    </div>
  </div>
  <script type="text/javascript" src="/js/script.js"></script>
</body>
</html>
